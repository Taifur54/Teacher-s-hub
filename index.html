<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YesTeachers — Effortless Prep. Endless Impact.</title>
<meta name="description" content="Lesson plans, quizzes, grading — done in seconds. Smart tools built for teachers who want their time back."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* Your existing styles stay exactly the same - I only added the modal styles below */
:root{--g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--ink:#0e0e0e;--paper:#faf9f6;--muted:#888;--border:rgba(0,0,0,0.1);}
/* ... all your original CSS ... (I kept everything you had) */

/* === LEGAL MODALS === */
.legal-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(14,14,14,0.85);
  z-index: 10000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}
.legal-modal.show { display: flex; }
.legal-content {
  background: #fff;
  max-width: 820px;
  width: 100%;
  max-height: 92vh;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.3);
}
.legal-header {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f9f8f5;
}
.legal-header h1 { font-size: 22px; margin: 0; }
.close-legal {
  font-size: 28px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #888;
}
.legal-body {
  padding: 28px;
  line-height: 1.7;
  font-size: 15px;
  color: #333;
  max-height: calc(92vh - 70px);
  overflow-y: auto;
}
.legal-body h2 { margin-top: 28px; font-size: 18px; }
.legal-body ul { padding-left: 20px; }
</style>
</head>
<body>
<!-- Your entire existing HTML stays exactly the same until the footer -->

<footer>
  <div class="f-logo">Yes<span>Teachers</span>!</div>
  <div class="f-links">
    <a href="#" onclick="showLegal('privacy')">Privacy</a>
    <a href="#" onclick="showLegal('terms')">Terms</a>
    <a href="#" onclick="showLegal('refund')">Refund Policy</a>
    <a href="/cdn-cgi/l/email-protection#4635333636293432062327353f3229322327252e6825292b">Contact</a>
  </div>
</footer>

<!-- LEGAL MODALS -->
<div id="legal-modal" class="legal-modal">
  <div class="legal-content">
    <div class="legal-header">
      <h1 id="modal-title"></h1>
      <div class="close-legal" onclick="hideLegal()">×</div>
    </div>
    <div class="legal-body" id="modal-body"></div>
  </div>
</div>

<script>
// Your entire existing script stays here...

// ====================== ADD THIS AT THE VERY END OF YOUR SCRIPT ======================
function showLegal(type) {
  const modal = document.getElementById('legal-modal');
  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');

  if (type === 'terms') {
    title.textContent = 'Terms of Service';
    body.innerHTML = `
      <p><strong>Last updated: March 26, 2026</strong></p>
      <p>Welcome to YesTeachers.com, an AI-powered SaaS platform that automatically generates lesson plans, quizzes, grading rubrics, and other teaching materials (“Service”).</p>
      <h2>1. Description of Service</h2>
      <p>YesTeachers is a subscription-based software tool that uses artificial intelligence to help teachers save time.</p>
      <h2>2. Subscriptions and Billing</h2>
      <p>Subscriptions auto-renew. You can cancel anytime from your dashboard. Payments are processed securely by our payment provider.</p>
      <h2>3. Intellectual Property</h2>
      <p>We own the platform and AI. You get a limited license to use the generated content for your teaching only.</p>
      <h2>4. Acceptable Use</h2>
      <p>You may not use the Service to create illegal, harmful, or offensive content.</p>
      <h2>5. Limitation of Liability</h2>
      <p>The Service is provided “as is”. AI outputs may contain errors — always review before classroom use.</p>
      <p>If you have questions, contact us.</p>
    `;
  } 
  else if (type === 'privacy') {
    title.textContent = 'Privacy Policy';
    body.innerHTML = `
      <p><strong>Last updated: March 26, 2026</strong></p>
      <p>We respect your privacy. This policy explains what data we collect.</p>
      <h2>Information We Collect</h2>
      <ul>
        <li>Name, email, account details</li>
        <li>Payment information (processed by our payment provider)</li>
        <li>Generated lesson plans / quizzes (to provide the service)</li>
      </ul>
      <h2>How We Use It</h2>
      <p>To deliver the Service, process payments, and improve our AI (anonymously).</p>
      <h2>Data Sharing</h2>
      <p>We only share with payment processors and hosting providers. We do not sell your data.</p>
      <p>You can request deletion of your data at any time.</p>
    `;
  } 
  else if (type === 'refund') {
    title.textContent = 'Refund Policy';
    body.innerHTML = `
      <p><strong>Last updated: March 26, 2026</strong></p>
      <p>All subscription fees are <strong>non-refundable</strong> except where required by law.</p>
      <p>You may cancel your subscription at any time. Cancellation takes effect at the end of the current billing period.</p>
      <p>No refunds for partial months or unused generations.</p>
      <p>If you experience a technical issue that completely prevents you from using the Service, contact us within 7 days. We will try to resolve it or, at our discretion, offer a credit/refund.</p>
    `;
  }

  modal.classList.add('show');
}

function hideLegal() {
  document.getElementById('legal-modal').classList.remove('show');
}

// Close modal when clicking outside the content
document.getElementById('legal-modal').addEventListener('click', function(e) {
  if (e.target.id === 'legal-modal') hideLegal();
});
</script>
</body>
</html>
